# .github/workflows/validate.yml
# Runs the test suite and repo-hygiene checks on every PR and push to main.

name: Validate & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    name: Tests + Repo Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml pytest httpx

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

      - name: Validate CONTRIBUTING and LICENSE exist
        run: |
          test -f CONTRIBUTING.md || (echo "CONTRIBUTING.md missing" && exit 1)
          test -f LICENSE         || (echo "LICENSE missing" && exit 1)

      - name: Check for ATTENTION.md flags
        run: |
          FLAGS=$(find stages/ -name "ATTENTION.md" 2>/dev/null | wc -l)
          if [ "$FLAGS" -gt 0 ]; then
            echo "WARNING: $FLAGS unresolved ATTENTION.md flag(s) found:"
            find stages/ -name "ATTENTION.md"
          fi
